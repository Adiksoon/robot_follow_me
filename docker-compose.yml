services:
  ros2:
    build: .
    container_name: ros2
    tty: true
    stdin_open: true
    network_mode: host

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - /home/zygar/ros2_ws:/root/ros2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    working_dir: /root/ros2_ws

    command: tail -f /dev/null
    restart: always
